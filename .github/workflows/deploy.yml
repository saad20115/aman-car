name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          # We execute git configuration fixes then standard pulling and building via Vite
          script: |
            cd /var/www/aman-car
            git config --global --add safe.directory /var/www/aman-car
            git pull origin main
            npm install
            npm run build
